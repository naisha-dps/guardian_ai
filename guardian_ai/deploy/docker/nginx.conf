# Guardian AI - Nginx Reverse Proxy Configuration
# Place at: /etc/nginx/conf.d/guardian_ai.conf
# Or used via Docker at: deploy/docker/nginx.conf

upstream guardian_backend {
    server guardian_backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain;

    # ─── API Routes ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://guardian_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ─── WebSocket ────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://guardian_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;  # Keep WS alive for 24h
        proxy_send_timeout 86400s;
    }

    # ─── Health Check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://guardian_backend/health;
        access_log off;
    }

    # ─── Direct backend passthrough ──────────────────────────────────────────
    location / {
        proxy_pass http://guardian_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

